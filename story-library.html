<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Story Library</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c63ff;
    --text: #e8eaf6;
    --muted: #7b7f94;
    --input-bg: #12141e;
    --green: #43e97b;
    --yellow: #ffd166;
    --red: #ef476f;
    --a0: #38ecec; --a0bg: rgba(56,236,236,.12);
    --a1: #43e97b; --a1bg: rgba(67,233,123,.12);
    --b1: #ffd166; --b1bg: rgba(255,209,102,.12);
    --c1: #ef476f; --c1bg: rgba(239,71,111,.12);
    --c2: #b44fff; --c2bg: rgba(180,79,255,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--text); font-weight: 400; font-size: 14px; margin-right: 10px; }
  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-row input {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-size: 13px; width: 230px; outline: none;
  }
  .api-row input:focus { border-color: var(--accent); }
  .save-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }

  /* LIBRARY */
  #library { padding: 24px; max-width: 1000px; margin: 0 auto; }
  .level-filter { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .level-filter span { font-size: 14px; color: var(--muted); }
  .filter-btn {
    padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 2px solid transparent; transition: all .2s;
    background: var(--card);
  }
  .filter-btn.all { color: var(--text); border-color: var(--border); }
  .filter-btn.all.active, .filter-btn.all:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.a0 { color: var(--a0); border-color: var(--a0bg); }
  .filter-btn.a0.active, .filter-btn.a0:hover { background: var(--a0bg); border-color: var(--a0); }
  .filter-btn.a1 { color: var(--a1); border-color: var(--a1bg); }
  .filter-btn.a1.active, .filter-btn.a1:hover { background: var(--a1bg); border-color: var(--a1); }
  .filter-btn.b1 { color: var(--b1); border-color: var(--b1bg); }
  .filter-btn.b1.active, .filter-btn.b1:hover { background: var(--b1bg); border-color: var(--b1); }
  .filter-btn.c1 { color: var(--c1); border-color: var(--c1bg); }
  .filter-btn.c1.active, .filter-btn.c1:hover { background: var(--c1bg); border-color: var(--c1); }
  .filter-btn.c2 { color: var(--c2); border-color: var(--c2bg); }
  .filter-btn.c2.active, .filter-btn.c2:hover { background: var(--c2bg); border-color: var(--c2); }

  .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .story-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .story-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .story-card::before {
    content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%;
  }
  .story-card.a0::before { background: var(--a0); }
  .story-card.a1::before { background: var(--a1); }
  .story-card.b1::before { background: var(--b1); }
  .story-card.c1::before { background: var(--c1); }
  .story-card.c2::before { background: var(--c2); }
  .card-level {
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    display: inline-block; margin-bottom: 10px;
  }
  .a0 .card-level { background: var(--a0bg); color: var(--a0); }
  .a1 .card-level { background: var(--a1bg); color: var(--a1); }
  .b1 .card-level { background: var(--b1bg); color: var(--b1); }
  .c1 .card-level { background: var(--c1bg); color: var(--c1); }
  .c2 .card-level { background: var(--c2bg); color: var(--c2); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-preview { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .card-meta { display: flex; gap: 12px; margin-top: 12px; align-items: center; }
  .card-meta span { font-size: 12px; color: var(--muted); }
  .read-btn {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; padding: 3px 10px; border-radius: 20px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .read-btn:hover { border-color: #43e97b; color: #43e97b; }
  .story-card.read-card { opacity: 0.55; }
  .story-card.read-card .read-btn { border-color: #43e97b; color: #43e97b; background: rgba(67,233,123,.1); }
  .read-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(67,233,123,.15); color: #43e97b;
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  }

  /* READER */
  #reader { display: none; padding: 24px; max-width: 700px; margin: 0 auto; }
  .reader-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .back-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; gap: 6px; transition: all .2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .reader-title { font-size: 22px; font-weight: 700; }
  .reader-level { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .reader-hint {
    background: rgba(108,99,255,.1); border: 1px solid rgba(108,99,255,.2);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted);
    margin-bottom: 20px; direction: rtl; text-align: right; line-height: 1.7;
  }
  .reader-hint strong { color: var(--accent); }

  /* STORY TEXT */
  .story-body {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px 32px; font-size: 18px; line-height: 2; color: var(--text);
    position: relative; user-select: text;
  }
  .story-body p { margin-bottom: 8px; position: relative; }
  .story-body p:last-child { margin-bottom: 0; }
  .word { cursor: pointer; border-radius: 3px; transition: background .15s; }
  .word:hover { background: rgba(108,99,255,.2); }
  .word.translated { background: rgba(108,99,255,.25); color: #fff; }
  .para-wrap { margin-bottom: 20px; }
  .para-translate-btn {
    display: inline-block; margin-top: 4px; margin-right: 4px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; padding: 3px 10px;
    border-radius: 20px; cursor: pointer; transition: all .2s;
  }
  .para-translate-btn:hover { border-color: var(--accent); color: var(--accent); }
  .para-translate-btn:disabled { opacity: .5; cursor: not-allowed; }
  .para-translation {
    background: rgba(108,99,255,.08); border: 1px solid rgba(108,99,255,.2);
    border-radius: 8px; padding: 8px 12px; font-size: 15px;
    color: var(--yellow); direction: rtl; text-align: right;
    margin-top: 6px; line-height: 1.7; display: none;
  }
  .para-translation.visible { display: block; animation: fadeIn .2s; }

  /* WORD TOOLTIP */
  #wordTooltip {
    position: fixed; z-index: 1000; background: #2a1f6e; border: 1px solid var(--accent);
    border-radius: 10px; padding: 8px 14px; font-size: 14px; color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); pointer-events: none;
    opacity: 0; transition: opacity .15s; max-width: 200px; text-align: center;
  }
  #wordTooltip.visible { opacity: 1; }
  #wordTooltip .heb { font-size: 16px; font-weight: 700; direction: rtl; }
  #wordTooltip .eng { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }

  /* SENTENCE TRANSLATION */
  #sentenceBar {
    position: fixed; bottom: 0; right: 0; left: 0; z-index: 200;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    transform: translateY(100%); transition: transform .25s ease;
  }
  #sentenceBar.visible { transform: translateY(0); }
  .sentence-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .sentence-selected { font-size: 14px; color: var(--text); opacity: .7; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .translate-btn {
    background: linear-gradient(135deg, #6c63ff, #8b5cf6);
    color: #fff; border: none; padding: 8px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .translate-btn:disabled { opacity: .5; }
  #sentenceResult {
    font-size: 15px; font-weight: 600; color: var(--yellow); direction: rtl;
    flex: 1; min-width: 200px; text-align: right;
  }
  .dismiss-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dismiss-btn:hover { color: var(--text); border-color: var(--text); }

  /* SPINNER */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .story-card { animation: fadeIn .2s ease; }
</style>
</head>
<body>

<header>
  <div class="logo">📚 Story Library <span>לחץ על מילה לתרגום | סמן משפט לתרגום</span></div>
  <div class="api-row">
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <button class="save-btn" onclick="saveKey()">שמור מפתח</button>
  </div>
</header>

<!-- WORD TOOLTIP -->
<div id="wordTooltip">
  <div class="heb" id="tooltipHeb">...</div>
  <div class="eng" id="tooltipEng"></div>
</div>


<!-- LIBRARY VIEW -->
<div id="library">
  <div class="level-filter">
    <span>רמה:</span>
    <button class="filter-btn all active" onclick="filterStories('all', this)">הכל</button>
    <button class="filter-btn all" onclick="filterStories('read', this)">✅ נקרא</button>
    <button class="filter-btn a0" onclick="filterStories('a0', this)">🔵 ממש קל</button>
    <button class="filter-btn a1" onclick="filterStories('a1', this)">🟢 ילדים</button>
    <button class="filter-btn b1" onclick="filterStories('b1', this)">🟡 B1–B2 בינוני</button>
    <button class="filter-btn c1" onclick="filterStories('c1', this)">🔴 C1 קשה</button>
    <button class="filter-btn c2" onclick="filterStories('c2', this)">🟣 C2 קשה מאד</button>
  </div>
  <div class="stories-grid" id="storiesGrid"></div>
</div>

<!-- READER VIEW -->
<div id="reader">
  <div class="reader-header">
    <button class="back-btn" onclick="backToLibrary()">← חזרה לספרייה</button>
    <button class="read-btn" id="readerReadBtn" onclick="toggleReadFromReader()" style="margin-right:auto;padding:7px 16px;font-size:13px;border-radius:10px;"></button>
    <div>
      <div class="reader-title" id="readerTitle"></div>
    </div>
    <span class="reader-level" id="readerLevel"></span>
  </div>
  <div class="reader-hint">
    <strong>💡 איך משתמשים:</strong>
    לחץ על <strong>מילה בודדת</strong> לתרגום מיידי לעברית •
    <strong>סמן משפט</strong> (גרור עם העכבר) לתרגום המשפט המלא
  </div>
  <div class="story-body" id="storyBody"></div>
</div>

<script>
// ─── STORIES DATA ──────────────────────────────────────────────────────────
const STORIES = [
  // ── A1–A2 ──────────────────────────────────────────────────────────────
  {
    id: 1, level: 'a1', levelLabel: 'ילדים',
    title: 'My Perfect Morning',
    preview: 'Every day I wake up at seven. I make coffee and sit by the window...',
    words: 210, mins: 2,
    text: `Every day I wake up at seven o'clock. The alarm rings and I turn it off quickly. I lie in bed for one minute, then I get up.

First, I go to the kitchen. I make coffee. The smell of coffee is wonderful. I sit by the window and look outside. The sky is blue and the sun is bright.

Then I eat breakfast. Today I have eggs and toast. My cat, Luna, sits next to me. She wants my food, but I say no.

After breakfast, I wash my face and brush my teeth. I put on my clothes and look in the mirror. I am ready.

I walk to work. It is not far — only fifteen minutes. On the way, I say hello to my neighbor, Mrs. Cohen. She is always outside in the morning with her small dog.

I arrive at work at eight thirty. My desk is near the window. I turn on my computer and drink the last of my coffee.

Today is a good day. I can feel it.`
  },
  {
    id: 2, level: 'a1', levelLabel: 'ילדים',
    title: 'The Lost Dog',
    preview: 'A small brown dog was sitting alone in the park. He looked sad and hungry...',
    words: 195, mins: 2,
    text: `A small brown dog was sitting alone in the park. He looked sad and hungry. His name was written on a blue collar around his neck: "Max."

A girl named Noa was walking home from school. She saw the dog and stopped. Max looked at her with big brown eyes.

"Are you lost?" Noa asked. Max did not answer, of course. But he wagged his tail.

Noa took out her phone and called the number on his collar. It rang three times.

A man answered. "Hello?"

"Hello," said Noa. "I found your dog. His name is Max. He is in the park near the supermarket."

"Oh, thank you!" said the man. His voice was very happy. "I am coming now!"

Ten minutes later, a man ran to the park. He had gray hair and a big smile. When Max saw him, the dog jumped and barked.

"Max! Good boy!" The man hugged the dog tightly.

He turned to Noa. "Thank you so much. I was worried all day."

Noa smiled. "I'm happy he's okay."

She walked home feeling warm inside.`
  },
  {
    id: 3, level: 'a1', levelLabel: 'ילדים',
    title: 'A New Neighbor',
    preview: 'The apartment next to mine was empty for two months. Then one Tuesday, someone moved in...',
    words: 220, mins: 2,
    text: `The apartment next to mine was empty for two months. Then one Tuesday morning, I heard noise — boxes moving, footsteps, a door opening and closing.

Someone moved in.

That evening, I knocked on the door. A young woman opened it. She had short dark hair and paint on her hands.

"Hi," I said. "I live next door. My name is Daniel."

"I'm Sara," she said with a smile. "Sorry for the mess. I'm still unpacking."

"No problem. Welcome to the building." I gave her a small plant. "It's for good luck."

Sara looked surprised. "Oh! That's so kind. Thank you."

We talked for a few minutes at the door. She told me she was an artist. She moved to the city for a new job at a design studio.

"It's a big change," she said.

"It gets easier," I said. "The neighbors are friendly. And there's a great coffee shop on the corner."

Sara laughed. "That's good to know. Coffee is very important to me."

I said goodnight and went back to my apartment. As I closed my door, I heard music coming from next door — something soft and happy.

It was nice to have a neighbor again.`
  },

  // ── B1–B2 ──────────────────────────────────────────────────────────────
  {
    id: 4, level: 'b1', levelLabel: 'B1 – Intermediate',
    title: 'The Job Interview',
    preview: 'David had been unemployed for three months. The email arrived on a Thursday morning...',
    words: 270, mins: 3,
    text: `David had been unemployed for three months when the email arrived on a Thursday morning. It was short and formal: "We would like to invite you for an interview next Monday at 10am."

He read it three times to make sure it was real.

On Monday, he wore his best shirt — the dark blue one he usually kept for weddings. He left the house forty minutes early, even though the office was only twenty minutes away. He didn't want to be late.

The waiting room was modern and quiet. Three other people sat in chairs, each holding a folder or a phone. David noticed his leg was bouncing. He pressed it still with his hand.

The interviewer was a woman named Yael. She had kind eyes but asked difficult questions. "Tell me about a time you failed at something and what you learned from it."

David thought of several answers. He chose the honest one.

He talked about a project that went wrong two years ago — a deadline he missed, the team that suffered because of it. He described how he fixed the process afterwards, and why he now kept a detailed calendar.

Yael wrote something down. David couldn't tell if it was good or bad.

"We'll be in touch by the end of the week," she said at the end.

Walking home, David felt something unexpected — not anxiety, but calm. Whatever happened, he had been honest. He had shown up.

That felt like enough.`
  },
  {
    id: 5, level: 'b1', levelLabel: 'B1 – Intermediate',
    title: 'The Unexpected Visitor',
    preview: 'It was almost midnight when someone knocked on Rachel\'s door. She wasn\'t expecting anyone...',
    words: 260, mins: 3,
    text: `It was almost midnight when someone knocked on Rachel's door. She wasn't expecting anyone — she had been planning a quiet evening with a book and herbal tea.

Through the peephole, she saw her younger brother, Avi. He was standing in the hallway with a backpack and an expression she recognized immediately: the look he had whenever something had gone wrong.

She opened the door.

"I need to sleep here tonight," he said. Not a question.

"Of course," she said. "Come in."

She made him a sandwich even though he said he wasn't hungry. He ate the whole thing. She made another. He ate that too.

They sat at the kitchen table for a long time without talking much. That was the thing about siblings — silence didn't always mean something was wrong. Sometimes it just meant you were together.

Eventually, Avi told her what had happened. An argument with his roommate, a misunderstanding at work, a string of small things that had piled on top of each other until he couldn't be alone in his apartment anymore.

Rachel listened without interrupting.

"I'm not sure what to do," he said.

"You don't have to figure it out tonight," she replied.

He nodded slowly. She gave him the extra blanket from the wardrobe. It was the one they had both used as children, patterned with faded blue stars.

He fell asleep on the sofa with the light still on.

Rachel turned it off and went to bed.`
  },
  {
    id: 6, level: 'b1', levelLabel: 'B2 – Intermediate',
    title: 'Learning to Cook',
    preview: 'For thirty-one years, Michael had never made anything more complicated than pasta...',
    words: 280, mins: 3,
    text: `For thirty-one years, Michael had never made anything more complicated than pasta from a box. Then his mother got sick, and suddenly someone had to feed the family.

He started with the basics. He bought a cookbook with large photographs and clear instructions. He read recipes the way he used to read technical manuals at work — carefully, looking for the logic behind each step.

The first attempt was chicken soup. He burned the onions, used too much salt, and somehow forgot to add the actual chicken until halfway through. The result was drinkable but barely.

The second time was better. The third time, his sister said it tasted "almost like Mom's."

He didn't tell her how many hours he had spent on the phone with their aunt in Haifa, asking about specific spices, the right proportion of celery, why you had to skim the foam.

There was something unexpectedly meditative about cooking. When he was stirring a sauce or chopping vegetables, his mind went quiet. All the worrying about his mother, the hospital visits, the paperwork — it faded into the background.

One evening, after dinner, his mother smiled at him from across the table.

"You've been cooking every night," she said.

"Someone has to," he answered.

She reached over and patted his hand.

He realized, sitting there, that food was never just food. It was showing up. It was the simplest way he knew to say: I'm here, I see you, you're not alone.

He started writing down the recipes. Just in case.`
  },
  {
    id: 7, level: 'b1', levelLabel: 'B2 – Intermediate',
    title: 'The Long Flight',
    preview: 'Gate 14B. Maya checked the departure board for the fourth time. Still delayed...',
    words: 255, mins: 3,
    text: `Gate 14B. Maya checked the departure board for the fourth time. Still delayed. Two hours had become three, and the announcement board now simply read: "Wait."

She found a seat by the window and watched planes take off into the grey afternoon sky. Each one disappeared into the clouds, then was gone.

The man sitting next to her was reading a paperback novel. Its cover was worn and the pages had turned yellow at the edges — the kind of book that had been read many times.

"Good book?" Maya asked, mostly because she was bored.

He looked up. He was older, perhaps sixty, with round glasses and an unhurried expression. "Very. Would you like it when I'm done? I finish it every time I fly to Amsterdam."

"You've read it before?"

"Seven times." He smiled slightly. "Each time, I notice something new."

Maya found that strange and interesting in equal measure. She asked what the book was about. He told her — a love story set in post-war Vienna, full of letters and misunderstandings and a reunion that took forty years.

By the time the flight was finally called, she had borrowed a pen from him, written down the title, and learned that he was a retired architect, that he had lived in four countries, and that he believed the best conversations always happened in airports.

"Because," he said, collecting his things, "nobody is trying to be anywhere other than here."

Maya thought about that all the way to her seat.`
  },

  // ── B1–B2 extra ────────────────────────────────────────────────────────
  {
    id: 38, level: 'b1', levelLabel: 'B1 – בינוני',
    title: 'The Wrong Train',
    preview: 'Nina got on the train at 7:42. She opened her book, found her seat, and didn\'t look up...',
    words: 260, mins: 3,
    text: `Nina got on the train at 7:42. She opened her book, found her seat, and didn't look up for twenty minutes. When she did, the landscape outside the window was wrong. Too many fields. Not enough buildings.

She looked at the screen above the door. This train was going to Hadera, not to Tel Aviv.

Her stomach dropped. She had been so absorbed in her book that she had boarded the wrong platform.

She got off at the next station — a small one she had never heard of — and stood on the platform trying to think clearly. The station had two benches, a vending machine, and a timetable that had not been updated since 2019.

She called her boss. He was not pleased but managed to stay professional about it.

The next train back would take forty minutes. Nina sat on one of the benches and looked at the surrounding fields. Crows were walking slowly through the rows of winter wheat.

It was, she realized, very quiet. She lived in the city and had forgotten what actual quiet felt like.

She didn't open her book. She just sat and watched the crows.

When the train finally came, she got on carefully, double-checked the destination, and found a window seat.

She didn't open the book on the way back either.

The wrong train, it turned out, had taken her somewhere she didn't know she needed to go.`
  },
  {
    id: 39, level: 'b1', levelLabel: 'B1 – בינוני',
    title: 'Night Shift',
    preview: 'Most people never see the city at 3am. Daniel had seen it every night for two years...',
    words: 255, mins: 3,
    text: `Most people never see the city at 3am. Daniel had seen it every night for two years, ever since he started working the night shift at a convenience store on Dizengoff Street.

He never saw her again. He did not explain why.

The letter ended: "I don't know why I'm telling you this. Perhaps because you're the only one who might understand that some things don't need to conclude to have mattered. The afternoon I spent with Miriam by the river was complete in itself. I carried it quietly for sixty years and I find I am not sorry — only grateful."

Ben read it twice, then set it on his desk next to a photograph of his grandfather as a young man.

    words: 285, mins: 4,
    text: `She made maps of places that didn't exist. Her studio was full of them — rolled and stacked against every wall, pinned above the drafting table, layered in shallow drawers like geological sediment. Continents with no corresponding landmass. Rivers with elaborately named tributaries that drained into inland seas. Coastlines shaped by a logic that was purely aesthetic.

People found this eccentric. Her sister, who was a structural engineer, found it baffling in a specific and recurring way that expressed itself as concern.

"But what are they for?" her sister would ask.

"Navigation," she would say, which wasn't entirely a joke.

She had started making imaginary maps during a period of grief — after her father's illness, during the long months of waiting that had no shape to them, no landmarks she could orient herself by. Drawing gave the formless a form. It was cartography as coping, though she would never have used those words.

What surprised her was that people wanted to buy them. Not as novelties or curiosities, but as objects to live with. A gallery in Berlin had shown twenty of them the previous spring. She had received letters — actual paper letters — from people describing the countries they saw in her work, each person finding something different, something personal.

One man from Lisbon wrote that a particular map reminded him of his childhood neighborhood, which had been demolished in the 1980s and existed now only in the memories of people who were getting old. He had hung the map in his dining room, he said. "Now I can show my grandchildren where I grew up."

She thought about that letter often. The idea that an invented place could become a container for a real one.

That seemed to her like a reasonable definition of what any artist was actually doing.`

Lena had nothing to look at except the black square of the window opposite, which returned a dim, imprecise version of her own face.

She thought about an argument she'd had that morning — not a dramatic one, but the slow, grinding kind, conducted largely through tone of voice. She had left the apartment without resolving it, which meant it had traveled with her all day, taking up space.

At some point in the last decade, she had stopped being good at the direct conversation. It had happened gradually, then all at once, the way most things do. She now communicated displeasure through careful withdrawal, through a particular way of being quiet, through making herself unavailable in rooms she was physically present in.

She recognized this as a failure of some kind. She wasn't sure whether the failure was hers alone.

The train lurched forward. A collective, unconscious exhale moved through the carriage.

    words: 265, mins: 4,
    text: `After the funeral, people came to the house and ate food they had not prepared, from dishes that did not belong to them. This was the custom and it served a function that Elana could only appreciate in retrospect: it meant you were never fully alone with what had just happened.

Her mother had been organized in the particular way that thorough people become when they know time is limited. The paperwork was in order. The instructions were in a folder labeled, with characteristic understatement, "Practicalities." The wishes for the funeral were specific and had been honored exactly.

What her mother had not organized, could not have organized, was the quality of the silence afterward.

It was not an empty silence. It was overfull — dense with the accumulated weight of a life Elana had known only partially, only from one angle, the way you know any person who raised you. There were photographs she had never seen. Friends who arrived and turned out to have been part of a life that predated Elana by decades. A woman who had been her mother's roommate at university cried in the kitchen and said: "She was the funniest person I ever knew," which startled Elana, because funny was not a word she would have instinctively chosen.

What you think you know about someone is always a portrait painted from a single direction.

Later, after everyone had left, Elana sat in her mother's armchair — the reading one, by the lamp, with the worn patch on the armrest — and tried to feel the shape of what was missing.

She found she couldn't, yet. It was too large to see from the inside.`

    text: `She had been his teacher for six years. At the end, at his last lesson before he left for university, she said something he didn't understand until much later.

She had been teaching him piano since he was eleven. By the end he was technically competent — better than most at his level, though not, she had been honest about this, destined for a professional career. He played with precision and reliability and without, she had occasionally said in her way, quite enough recklessness.

At the last lesson, after the last piece, she was quiet for a moment.

"You play safe," she said. Not unkindly. Observationally. "You've always played safe."

He didn't know how to respond.

"That's not an insult. Safe playing comes from listening — you're always checking whether you're within range. Most people never develop that kind of ear."

A pause.

"But there will be a point," she said, "when you have to play something without checking first whether it's right. You'll have the notes. You just have to trust them."

He nodded in the way students nod when they are processing something they can't yet metabolise.

He thought about it for years. Not always in relation to music. In fact, almost never in relation to music — by university he had mostly stopped playing.

The statement had migrated, as the best things teachers say will migrate, from its original context into every relevant situation he encountered.

He wrote her a letter, eventually. Fifteen years after the lesson.

She remembered him.`

The difficulty is that stories have structural requirements that reality does not share. Stories need coherence. They need — or strongly prefer — causation, where events lead to other events for reasons. They need characters who change or fail to change in ways that carry meaning. They need something that functions as resolution, even if it is only provisional.

Reality, by contrast, is under no obligation to provide any of these things. Events occur adjacently without being causally linked. People behave in ways that are inconsistent with their previous behaviour and the most plausible explanation is chance or randomness rather than any meaningful development of character. Things do not resolve; they continue, or they simply stop.

The autobiographical self — the narrative of who we are and what has happened to us — is therefore not a record but a construction. A selective attention to certain events over others, a retrospective imposition of causation, an ongoing editing process that preserves coherence at the cost of strict accuracy.

This is not pathological. It is universal.

What becomes pathological is the rigidity of the narrative — the inability to revise it in the face of evidence that contradicts it, the defensive maintenance of a story that no longer fits the person living it.

    words: 295, mins: 5,
    text: `The ruin has always occupied an ambiguous position in the Western aesthetic imagination — simultaneously an object of melancholy and of desire, a site of loss that is also, perversely, a site of beauty. The eighteenth-century picturesque movement codified this response: painters and garden designers deliberately cultivated decrepitude, importing crumbling follies into manicured landscapes, framing decomposition as a species of the sublime. To contemplate a ruin was to contemplate time itself, and to find that contemplation pleasurable was to achieve a particular kind of philosophical distance from one's own mortality.

What is less often remarked is the violence this aesthetic requires. The ruin is beautiful partly because it has been emptied. The Colosseum is photogenic in a way it never could have been when it smelled of blood and animals and fifty thousand bodies pressed together in the heat. The beauty of Pompeii depends entirely on the deaths that produced it; the preservation requires the catastrophe. We aestheticize what we have first sanitized, and we call this culture.

This is not a counsel of paralysis. One cannot walk through Rome in a state of continuous moral alarm, nor would it be reasonable to expect that architecture should not outlast the politics that produced it. But the ease with which the aesthetic response suppresses the historical one deserves at least acknowledgment. When we stand before a ruin and feel something like awe, we are having a response that has been carefully prepared for us — by centuries of representational convention, by the selective survival of what happened to be made of stone, by the particular amnesias of the tradition within which we were educated.

The question is not whether to look. It is whether to notice that we are being directed where to look, and to remain, even in the midst of the pleasure, slightly suspicious of our own gaze.`

This is why displacement is experienced as something more than inconvenience. The refugee, the evicted tenant, the person whose childhood home has been demolished — these are not simply people who lack accommodation. They are people from whom a particular ontological scaffold has been removed, leaving the self exposed to a contingency it had successfully, if partially, forgotten about. Home is where we go to be off-duty from existence. Without it, the background noise of pure vulnerability becomes, suddenly, audible.

I think about this in relation to the peculiar grief of returning to a place one has loved and finding it altered. The building stands; the address is unchanged; and yet the thing you went back for — the specific quality of afternoon light in a particular room, the smell of a hallway that encoded years of arrival and departure — is gone, replaced by renovation, by new occupants who have no interest in your history with their walls. The place has not disappeared. It has become indifferent to you. And there is a specific species of loneliness in being unknown by something that once knew you.

This is a recent and parochial view, even if it presents itself as a moral universal. Cultures and eras that valued discretion, formality, and the maintenance of social surface were not, for this reason, less honest. They had, rather, a different theory of where honesty was owed — to the particular, the proximate, the relationship of genuine trust — and a different sense of what the exposure of interiority actually accomplished. The performance of vulnerability is not the same as vulnerability; the narration of grief is not the same as grief; and the distinction matters more than we currently seem to think.

There is, moreover, a case to be made for opacity that is not defensive but generative. The self requires some portion of the unshared in order to maintain the conditions of genuine reflection. What is immediately expressed is not processed; what is spoken before it is understood becomes, inevitably, a kind of theater. The private self — the one that exists in the gap between experience and articulation — is not a hidden self in the pejorative sense. It is the self that is still becoming something before the demand arrives to be already something finished.

// ─── STATE ────────────────────────────────────────────────
let apiKey = localStorage.getItem('story_api_key') || '';
let currentWord = null;
let selectedText = '';
let wordCache = new Map();
let currentStory = null;
let selTimer = null;
let readStories = new Set(JSON.parse(localStorage.getItem('read_stories') || '[]'));
let currentFilter = 'all';

// ─── INIT ─────────────────────────────────────────────────
window.onload = () => {
  if (apiKey) document.getElementById('apiKey').value = apiKey;
  renderLibrary('all');
  // Use mouseup on story body — captures selection before anything clears it
  document.addEventListener('mouseup', (e) => {
    // Don't interfere with sentence bar buttons
    if (e.target.closest('#sentenceBar')) return;
    setTimeout(checkSelection, 30);
  });
  document.addEventListener('click', handleDocClick);
};

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('story_api_key', apiKey);
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✓ נשמר';
  setTimeout(() => btn.textContent = 'שמור מפתח', 1500);
}

// ─── LIBRARY ──────────────────────────────────────────────
function renderLibrary(filter) {
  currentFilter = filter;
  const grid = document.getElementById('storiesGrid');
  let filtered;
  if (filter === 'all') filtered = STORIES;
  else if (filter === 'read') filtered = STORIES.filter(s => readStories.has(s.id));
  else filtered = STORIES.filter(s => s.level === filter);

  grid.innerHTML = filtered.map(s => {
    const isRead = readStories.has(s.id);
    return `
    <div class="story-card ${s.level}${isRead ? ' read-card' : ''}" onclick="openStory(${s.id})">
      ${isRead ? '<div class="read-badge">✓ נקרא</div>' : ''}
      <div class="card-level">${s.levelLabel}</div>
      <div class="card-title">${s.title}</div>
      <div class="card-preview">${s.preview}</div>
      <div class="card-meta">
        <span>📖 ${s.words} words</span>
        <span>⏱ ${s.mins} min</span>
        <button class="read-btn" onclick="toggleRead(event,${s.id})">${isRead ? '✓ נקרא' : '☐ סמן כנקרא'}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleRead(e, id) {
  e.stopPropagation();
  if (readStories.has(id)) readStories.delete(id);
  else readStories.add(id);
  localStorage.setItem('read_stories', JSON.stringify([...readStories]));
  renderLibrary(currentFilter);
}

function filterStories(level, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLibrary(level);
}

// ─── READER ───────────────────────────────────────────────
function openStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  if (!currentStory) return;

  document.getElementById('library').style.display = 'none';
  const reader = document.getElementById('reader');
  reader.style.display = 'block';

  document.getElementById('readerTitle').textContent = currentStory.title;
  const levelEl = document.getElementById('readerLevel');
  levelEl.textContent = currentStory.levelLabel;
  levelEl.className = 'reader-level';
  levelEl.style.background = `var(--${currentStory.level}bg)`;
  levelEl.style.color = `var(--${currentStory.level})`;

  document.getElementById('storyBody').innerHTML = buildStoryHtml(currentStory.text);
  wordCache.clear();
  updateReaderReadBtn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateReaderReadBtn() {
  const btn = document.getElementById('readerReadBtn');
  if (!btn || !currentStory) return;
  const isRead = readStories.has(currentStory.id);
  btn.textContent = isRead ? '✓ נקרא' : '☐ סמן כנקרא';
  btn.style.borderColor = isRead ? '#43e97b' : '';
  btn.style.color = isRead ? '#43e97b' : '';
}

function toggleReadFromReader() {
  if (!currentStory) return;
  if (readStories.has(currentStory.id)) readStories.delete(currentStory.id);
  else readStories.add(currentStory.id);
  localStorage.setItem('read_stories', JSON.stringify([...readStories]));
  updateReaderReadBtn();
}

function buildStoryHtml(text) {
  const paragraphs = text.split('\n').filter(p => p.trim());
  return paragraphs.map((para, i) => {
    const words = para.split(/(\s+)/);
    const html = words.map(part => {
      if (/^\s+$/.test(part)) return part;
      const clean = part.replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g, '');
      if (!clean) return escHtml(part);
      return `<span class="word" data-word="${escAttr(clean)}" onclick="clickWord(this)">${escHtml(part)}</span>`;
    }).join('');
    return `<div class="para-wrap">
      <p data-para="${escAttr(para)}">${html}</p>
      <button class="para-translate-btn" onclick="translatePara(this, ${i})">🌐 תרגם פסקה</button>
      <div class="para-translation" id="para-tr-${i}"></div>
    </div>`;
  }).join('');
}

function backToLibrary() {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('library').style.display = 'block';
  hideTooltip();
  dismissBar();
  currentStory = null;
}

// ─── WORD CLICK ───────────────────────────────────────────
async function clickWord(el) {
  const word = el.dataset.word;
  if (!word || word.length < 2) return;

  // hide sentence bar if open
  dismissBar();

  const tooltip = document.getElementById('wordTooltip');
  if (tooltip.classList.contains('visible') && currentWord === word) {
    hideTooltip(); return;
  }

  currentWord = word;
  const rect = el.getBoundingClientRect();
  const sentence = el.closest('p')?.textContent?.trim() || '';

  document.getElementById('tooltipHeb').textContent = '...';
  document.getElementById('tooltipEng').textContent = word;
  positionTooltip(rect);
  tooltip.classList.add('visible');

  const cacheKey = word.toLowerCase() + '|' + sentence.slice(0, 60);
  if (wordCache.has(cacheKey)) {
    document.getElementById('tooltipHeb').textContent = wordCache.get(cacheKey);
    return;
  }

  try {
    const key = apiKey || document.getElementById('apiKey').value.trim();
    if (!key) { document.getElementById('tooltipHeb').textContent = '← הוסף API Key'; return; }

    const heb = await translateWord(word, sentence, key);
    wordCache.set(cacheKey, heb);
    if (currentWord === word) {
      document.getElementById('tooltipHeb').textContent = heb;
      el.classList.add('translated');
    }
  } catch(e) {
    if (currentWord === word) document.getElementById('tooltipHeb').textContent = '⚠️ ' + (e.message || 'שגיאה');
  }
}

function positionTooltip(rect) {
  const tooltip = document.getElementById('wordTooltip');
  const tw = 200, th = 64;

  // position: fixed — viewport coords only, no scrollY
  let left = rect.left + rect.width / 2 - tw / 2;
  let top = rect.top - th - 10;

  // keep inside viewport horizontally
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;

  // if too high — show below the word instead
  if (top < 8) top = rect.bottom + 10;

  // if too low — clamp to bottom of screen
  if (top + th > window.innerHeight - 8) top = window.innerHeight - th - 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('wordTooltip').classList.remove('visible');
  currentWord = null;
}

function handleDocClick(e) {
  if (!e.target.classList.contains('word') && !document.getElementById('wordTooltip').contains(e.target)) {
    hideTooltip();
  }
}

// ─── PARAGRAPH TRANSLATE ──────────────────────────────────
async function translatePara(btn, idx) {
  const paraEl = btn.previousElementSibling;
  const resultEl = document.getElementById('para-tr-' + idx);
  const paraText = paraEl.dataset.para || paraEl.textContent;

  // Toggle — if already translated, hide
  if (resultEl.classList.contains('visible')) {
    resultEl.classList.remove('visible');
    btn.textContent = '🌐 תרגם פסקה';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const key = apiKey || document.getElementById('apiKey').value.trim();
    if (!key) { resultEl.textContent = '← הוסף API Key'; resultEl.classList.add('visible'); btn.disabled = false; btn.textContent = '🌐 תרגם פסקה'; return; }

    // Use cache
    if (resultEl.dataset.cached) {
      resultEl.classList.add('visible');
      btn.textContent = '🔼 הסתר';
      btn.disabled = false;
      return;
    }

    const heb = await translateText(paraText, key);
    resultEl.textContent = heb;
    resultEl.dataset.cached = '1';
    resultEl.classList.add('visible');
    btn.textContent = '🔼 הסתר';
  } catch(e) {
    resultEl.textContent = '⚠️ ' + (e.message || 'שגיאה');
    resultEl.classList.add('visible');
    btn.textContent = '🌐 תרגם פסקה';
  } finally {
    btn.disabled = false;
  }
}

function dismissBar() {}

// ─── API ──────────────────────────────────────────────────
async function gemini(prompt, _unused, key, maxTokens) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${key}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `שגיאת API: ${res.status}`);
  }
  const data = await res.json();
  return data.choices[0].message.content.trim();
}

async function translateWord(word, sentence, key) {
  const prompt = `You are a precise English-Hebrew dictionary for language learners.
Translate the English word "${word}" to Hebrew.
${sentence ? `It appears in this sentence: "${sentence}"` : ''}
Rules:
- Reply with ONLY the Hebrew word or short phrase — nothing else
- Be exact and dictionary-accurate: e.g. "unemployed" → מובטל, "salary" → משכורת, "exhausted" → מותש
- If the word has one clear Hebrew equivalent, give that. Do NOT paraphrase.
- Maximum 3 Hebrew words. No punctuation. No explanations.`;
  return gemini(prompt, '', key, 30);
}

async function translateText(text, key) {
  return gemini(
    `You are a professional Hebrew translator. Translate the following English text into natural, fluent Hebrew — as if it were originally written in Hebrew. Do NOT translate word-for-word. Use natural Hebrew sentence structure and phrasing. Reply with ONLY the Hebrew translation, nothing else.\n\nText to translate:\n${text}`,
    '', key, 400
  );
}

// ─── UTILS ────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
